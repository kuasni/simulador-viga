<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strukturarte - Simulador de Viga</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0f14;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }

        /* Contenedor vertical optimizado para formato TikTok (9:16) */
        .tiktok-container {
            width: 100%;
            max-width: 430px;
            background: #141822;
            border: 2px solid #00ffff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Encabezado del canal */
        .header {
            text-align: center;
            border-bottom: 2px dashed #334155;
            padding-bottom: 10px;
        }

        .header h1 {
            font-size: 1.4rem;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
        }

        .header p {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 2px;
        }

        /* Alerta de Estado Estructural */
        #alert-panel {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            color: #10b981;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        #alert-panel.danger {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
            100% { opacity: 0.8; }
        }

        /* Bloque Visual Principal: Sección Izquierda y Gráfico Derecha */
        .visual-block {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            align-items: stretch;
        }

        /* Panel de la Sección Transversal de Concreto */
        .section-box {
            background: #0d0f14;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 180px;
        }

        .section-title {
            font-size: 0.75rem;
            color: #94a3b8;
            position: absolute;
            top: 6px;
            left: 10px;
            text-transform: uppercase;
        }

        /* Dibujo SVG de la viga física */
        #beam-svg {
            width: 100%;
            height: 150px;
            margin-top: 15px;
        }

        /* Contenedor del Gráfico de Comportamiento */
        .chart-box {
            background: #0d0f14;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 180px;
        }

        /* Panel de Controles y Sliders */
        .controls-card {
            background: #1e2530;
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #475569;
        }

        .control-group {
            margin-bottom: 10px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #cbd5e1;
            margin-bottom: 4px;
        }

        .control-label span.value {
            color: #00ffff;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #00ffff;
            cursor: pointer;
        }

        /* Botón de Acción Principal */
        .btn-action {
            width: 100%;
            background: linear-gradient(135deg, #00ffff 0%, #ff00ff 100%);
            border: none;
            color: #ffffff;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(255, 0, 255, 0.3);
            transition: transform 0.1s ease;
        }

        .btn-action:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="tiktok-container">
        <div class="header">
            <h1>Strukturarte</h1>
            <p>Diseño de Vigas de Concreto Reforzado</p>
        </div>

        <div id="alert-panel">Estado: Sección Dúctil (Correcta)</div>

        <div class="visual-block">
            <div class="section-box">
                <div class="section-title">Sección Transversal</div>
                <svg id="beam-svg"></svg>
            </div>

            <div class="chart-box">
                <canvas id="canvas-grafico"></canvas>
            </div>
        </div>

        <div class="controls-card">
            <div class="control-group">
                <div class="control-label">Base de la viga (b) <span class="value" id="val-b">30 cm</span></div>
                <input type="range" id="slide-b" min="20" max="50" value="30">
            </div>

            <div class="control-group">
                <div class="control-label">Peralte total (h) <span class="value" id="val-h">50 cm</span></div>
                <input type="range" id="slide-h" min="30" max="70" value="50">
            </div>

            <div class="control-group">
                <div class="control-label">Número de varillas (As) <span class="value" id="val-varillas">3 varillas</span></div>
                <input type="range" id="slide-varillas" min="2" max="8" value="3">
            </div>
        </div>

        <button class="btn-action" onclick="calcularYAnimar()">Cargar Viga</button>
    </div>

    <script>
        let grafico;

        function inicializarGrafico() {
            const ctx = document.getElementById('canvas-grafico').getContext('2d');
            grafico = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [0, 1, 2, 3, 4, 5],
                    datasets: [{
                        label: 'Momento (kN·m)',
                        data: [0, 0, 0, 0, 0, 0],
                        borderColor: '#ff00ff',
                        borderWidth: 3,
                        backgroundColor: 'rgba(255, 0, 255, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: '#232b3c' }, ticks: { color: '#94a3b8', font: { size: 9 } } },
                        y: { grid: { color: '#232b3c' }, ticks: { color: '#94a3b8', font: { size: 9 } } }
                    }
                }
            });
        }

        function dibujarSeccion(b, h, numVarillas) {
            const svg = document.getElementById('beam-svg');
            svg.innerHTML = ''; // Limpiar previo

            const svgW = svg.clientWidth || 180;
            const svgH = svg.clientHeight || 150;

            // Escalamiento dinámico para que la viga quepa bien en su cuadro
            const escala = Math.min((svgW - 40) / b, (svgH - 40) / h);
            const wDibujo = b * escala;
            const hDibujo = h * escala;

            // Centrar dibujo dentro del SVG
            const x0 = (svgW - wDibujo) / 2;
            const y0 = (svgH - hDibujo) / 2;

            // 1. Dibujar Bloque de Concreto
            const concreto = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            concreto.setAttribute("x", x0);
            concreto.setAttribute("y", y0);
            concreto.setAttribute("width", wDibujo);
            concreto.setAttribute("height", hDibujo);
            concreto.setAttribute("fill", "#2d3748");
            concreto.setAttribute("stroke", "#ffffff");
            concreto.setAttribute("stroke-width", "3");
            concreto.setAttribute("rx", "4");
            svg.appendChild(concreto);

            // 2. Dibujar Estribo perimetral (Capa de recubrimiento simulación)
            const recubrimiento = 15; 
            if (wDibujo > recubrimiento * 2 && hDibujo > recubrimiento * 2) {
                const estribo = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                estribo.setAttribute("x", x0 + 10);
                estribo.setAttribute("y", y0 + 10);
                estribo.setAttribute("width", wDibujo - 20);
                estribo.setAttribute("height", hDibujo - 20);
                estribo.setAttribute("fill", "none");
                estribo.setAttribute("stroke", "#4a5568");
                estribo.setAttribute("stroke-width", "1.5");
                svg.appendChild(estribo);
            }

            // 3. Dibujar Varillas de Acero de Refuerzo (Fila inferior)
            const yVarillas = y0 + hDibujo - 20;
            const xInicio = x0 + 20;
            const xFin = x0 + wDibujo - 20;
            const paso = numVarillas > 1 ? (xFin - xInicio) / (numVarillas - 1) : 0;

            for (let i = 0; i < numVarillas; i++) {
                const cx = numVarillas > 1 ? xInicio + (paso * i) : (xInicio + xFin) / 2;
                const varilla = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                varilla.setAttribute("cx", cx);
                varilla.setAttribute("cy", yVarillas);
                varilla.setAttribute("r", "7"); // Tamaño visual claro de la varilla
                varilla.setAttribute("fill", "#00ffff");
                varilla.setAttribute("stroke", "#ffffff");
                varilla.setAttribute("stroke-width", "1");
                svg.appendChild(varilla);
            }
        }

        function calcularYAnimar() {
            const b = parseFloat(document.getElementById('slide-b').value);
            const h = parseFloat(document.getElementById('slide-h').value);
            const n = parseInt(document.getElementById('slide-varillas').value);

            // Área de acero aproximada (Varillas No. 5 estándar ~ 2 cm² c/u)
            const As = n * 2.0; 
            const d = h - 5; // Peralte efectivo
            const fy = 420;  // Grado 420 MPa
            const fc = 250;  // f'c 250 kg/cm²

            // Cuantía de acero
            const rho = As / (b * d);
            const rhoMax = 0.016; // Límite reglamentario aproximado para falla dúctil

            const alertPanel = document.getElementById('alert-panel');
            
            // Evaluar condición de falla estructural por sobre-refuerzo
            if (rho > rhoMax) {
                alertPanel.innerText = "¡FALLA ESTRUCTURAL! SECCIÓN FRÁGIL";
                alertPanel.className = "danger";
            } else {
                alertPanel.innerText = "Estado: Sección Dúctil (Diseño Seguro)";
                alertPanel.className = "";
            }

            // Generar curva momento-curvatura sintética para animación
            const mMax = (As * fy * (d - (As * fy) / (1.7 * fc * b))) / 100; // Momento nominal en kN·m
            
            let datosPasos = [];
            let etiquetas = [];
            for (let i = 0; i <= 10; i++) {
                etiquetas.push((i * 0.003).toFixed(3));
                // Curva plástica parabólica
                let factor = Math.sin((i / 10) * (Math.PI / 2));
                datosPasos.push(mMax * factor);
            }

            // Animación progresiva del gráfico de Chart.js
            grafico.data.labels = etiquetas;
            grafico.data.datasets[0].data = Array(11).fill(0);
            grafico.update();

            let pasoActual = 0;
            const intervalo = setInterval(() => {
                if (pasoActual <= 10) {
                    grafico.data.datasets[0].data[pasoActual] = datosPasos[pasoActual];
                    grafico.update('none'); // Update suave sin saltar
                    pasoActual++;
                } else {
                    clearInterval(intervalo);
                }
            }, 60);
        }

        // Sincronizar Sliders y actualización en tiempo real al mover controles
        function vincularControles() {
            const inputs = [
                { id: 'slide-b', valId: 'val-b', sufijo: ' cm' },
                { id: 'slide-h', valId: 'val-h', sufijo: ' cm' },
                { id: 'slide-varillas', valId: 'val-varillas', sufijo: ' varillas' }
            ];

            inputs.forEach(item => {
                const slider = document.getElementById(item.id);
                const etiqueta = document.getElementById(item.valId);

                const actualizar = () => {
                    etiqueta.innerText = slider.value + item.sufijo;
                    const b = document.getElementById('slide-b').value;
                    const h = document.getElementById('slide-h').value;
                    const n = document.getElementById('slide-varillas').value;
                    dibujarSeccion(b, h, n);
                };

                slider.addEventListener('input', actualizar);
            });
        }

        // Inicialización al cargar la ventana
        window.onload = () => {
            inicializarGrafico();
            vincularControles();
            // Dibujo inicial estándar
            dibujarSeccion(30, 50, 3);
        };
    </script>
</body>
</html>
