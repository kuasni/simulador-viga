<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strukturarte - Simulador de Viga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19; /* Fondo oscuro estilo Cyberpunk / Neón */
        }
        .p5Canvas {
            border-radius: 0.75rem;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.2);
            display: block;
            margin: 0 auto;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #00FFFF;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px #00FFFF;
        }
    </style>
</head>
<body class="text-slate-100 flex justify-center items-center min-h-screen p-0 m-0">

    <div class="w-[432px] h-[768px] bg-slate-950 p-4 flex flex-col justify-between relative overflow-hidden border border-slate-800 shadow-2xl">
        
        <header class="text-center pt-2">
            <h1 class="text-xl font-bold text-cyan-400 tracking-wide uppercase">Strukturarte</h1>
            <p class="text-xs text-slate-400">Flexión en Concreto Reforzado</p>
        </header>

        <div id="status-message" class="py-2 text-center font-bold text-base rounded-md mx-2 transition-all">
            Presiona Iniciar
        </div>

        <div class="grid grid-cols-2 gap-2 px-2 text-center">
            <div class="bg-slate-900/80 p-2 rounded-lg border border-slate-800">
                <h4 class="text-[10px] uppercase tracking-wider text-slate-400">Mu Actuante</h4>
                <p id="momento-max" class="text-base font-bold text-cyan-400">0 kg-m</p>
            </div>
            <div class="bg-slate-900/80 p-2 rounded-lg border border-slate-800">
                <h4 class="text-[10px] uppercase tracking-wider text-slate-400">ΦMn Resistente</h4>
                <p id="momento-res" class="text-base font-bold text-emerald-400">0 kg-m</p>
            </div>
        </div>

        <div class="flex-1 flex flex-col justify-center space-y-2 my-2">
            <div id="canvas-container" class="w-full p-1">
                </div>
            
            <div class="grid grid-cols-2 gap-2 px-1">
                <div class="bg-slate-900 p-2 rounded-lg border border-slate-800 text-center">
                    <p class="text-[10px] font-semibold text-slate-400 mb-1">Perfil ε</p>
                    <div id="strain-profile-container" class="h-[90px] w-full"></div>
                </div>
                <div class="bg-slate-900 p-2 rounded-lg border border-slate-800 text-center">
                    <p class="text-[10px] font-semibold text-slate-400 mb-1">Sección Transversal</p>
                    <div id="cross-section-container" class="h-[90px] w-full"></div>
                </div>
            </div>
        </div>

        <div class="bg-slate-900/90 p-3 rounded-xl border border-slate-800 space-y-2 mb-2">
            <div class="flex justify-between items-center text-xs border-b border-slate-800 pb-1">
                <span class="text-slate-400">Tipo de Falla: <strong id="failure-type" class="text-white">--</strong></span>
                <span class="text-slate-400">As: <strong id="as-val" class="text-cyan-400">0</strong> cm²</span>
            </div>

            <div class="grid grid-cols-2 gap-x-3 gap-y-1.5 text-[11px]">
                <div>
                    <label class="block text-slate-400">Longitud: <span id="longitud-val" class="text-white font-bold"></span>m</label>
                    <input type="range" id="longitud" min="3" max="10" value="5" step="0.5" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>
                <div>
                    <label class="block text-slate-400">Altura (h): <span id="altura-val" class="text-white font-bold"></span>cm</label>
                    <input type="range" id="altura" min="30" max="70" value="50" step="5" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>
                <div>
                    <label class="block text-slate-400">Base (b): <span id="base-val" class="text-white font-bold"></span>cm</label>
                    <input type="range" id="base" min="15" max="40" value="25" step="5" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>
                <div>
                    <label class="block text-slate-400">f'c: <span id="fc-val" class="text-white font-bold"></span> kg/v²</label>
                    <input type="range" id="fc" min="200" max="450" value="250" step="50" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>

            <div class="flex items-center space-x-2 pt-1 text-[11px]">
                <div class="flex-1 flex items-center space-x-1">
                    <span class="text-slate-400">Varillas:</span>
                    <input type="number" id="numBarras" value="4" min="2" class="w-10 p-0.5 bg-slate-800 border border-slate-700 rounded text-center text-white">
                </div>
                <div class="flex-1 flex items-center space-x-1">
                    <span class="text-slate-400">Calibre:</span>
                    <select id="diamBarras" class="p-0.5 bg-slate-800 border border-slate-700 rounded text-white text-[10px]">
                        <option value="4">#4 (1/2")</option>
                        <option value="5">#5 (5/8")</option>
                        <option value="6" selected>#6 (3/4")</option>
                        <option value="8">#8 (1")</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2 pt-1">
                <button id="start-sim" class="col-span-2 bg-blue-600 hover:bg-blue-500 text-white font-bold py-1.5 px-2 rounded text-xs tracking-wider uppercase transition-colors">Cargar Viga</button>
                <button id="reset-sim" class="bg-slate-700 hover:bg-slate-600 text-white font-medium py-1.5 px-2 rounded text-xs transition-colors">Reset</button>
            </div>
        </div>

        <input type="hidden" id="fy" value="4200">
        <input type="hidden" id="recubrimiento" value="4">
        <span id="fy-val" class="hidden"></span><span id="rec-val" class="hidden"></span><span id="carga-aplicada" class="hidden"></span>
    </div>

    <script>
        // --- COMIENZA TU LÓGICA DE P5.JS ORIGINAL (CON AJUSTES DE COLOR DE FONDO OSCURO) ---
        let p5_instances = {};
        const Es = 2000000; 
        const epsilon_c_ult = 0.003; 
        const diametros_cm2 = { '4': 1.29, '5': 1.99, '6': 2.84, '8': 5.07 };
        const diametros_mm = { '4': 12.7, '5': 15.9, '6': 19.1, '8': 25.4 };

        let mainSketch = function(p) {
            let dom = {};
            let sim = { running: false, beamFailed: false, load: 0, phiMn: 0, beam: { c: 0, epsilon_s: 0 }, loadIncrement: 0, failureLoad: 0, Vmax_at_failure: 0 };
            
            p.setup = function() {
                let canvasContainer = p.select('#canvas-container');
                let c = p.createCanvas(canvasContainer.width, canvasContainer.width * 0.75).parent(canvasContainer);
                p.pixelDensity(1);
                p.sim = sim;
                connectDOM(); addEventListeners(); updateBeamProperties(); resetSimulation();
            };

            p.windowResized = function() {
                let canvasContainer = p.select('#canvas-container');
                p.resizeCanvas(canvasContainer.width, canvasContainer.width * 0.75);
            };

            function connectDOM() {
                dom.longitudSlider = p.select('#longitud'); dom.baseSlider = p.select('#base'); dom.alturaSlider = p.select('#altura');
                dom.fcSlider = p.select('#fc'); dom.fySlider = p.select('#fy'); dom.recubrimientoSlider = p.select('#recubrimiento');
                dom.numBarrasInput = p.select('#numBarras'); dom.diamBarrasSelect = p.select('#diamBarras');
                dom.longitudVal = p.select('#longitud-val'); dom.baseVal = p.select('#base-val'); dom.alturaVal = p.select('#altura-val');
                dom.fcVal = p.select('#fc-val'); dom.fyVal = p.select('#fy-val'); dom.recVal = p.select('#rec-val'); dom.asVal = p.select('#as-val');
                dom.startBtn = p.select('#start-sim'); dom.resetBtn = p.select('#reset-sim'); dom.failureTypeEl = p.select('#failure-type');
            }

            function addEventListeners() {
                dom.startBtn.mousePressed(() => { 
                    if (!sim.beamFailed && sim.phiMn > 0) {
                        sim.failureLoad = (8 * sim.phiMn) / (sim.beam.L * sim.beam.L);
                        sim.Vmax_at_failure = sim.failureLoad * sim.beam.L / 2;
                        sim.loadIncrement = sim.failureLoad / (3 * 60); // Ajustado para durar 3 segundos en animación
                        sim.running = true;
                    }
                });
                dom.resetBtn.mousePressed(resetSimulation);
                [dom.longitudSlider, dom.baseSlider, dom.alturaSlider, dom.fcSlider, dom.numBarrasInput, dom.diamBarrasSelect].forEach(input => {
                    input.input(updateBeamProperties);
                });
            }

            function updateBeamProperties() {
                sim.beam.L = dom.longitudSlider.value(); sim.beam.b = dom.baseSlider.value(); sim.beam.h = dom.alturaSlider.value();
                sim.beam.fc = dom.fcSlider.value(); sim.beam.fy = dom.fySlider.value(); sim.beam.rec = dom.recubrimientoSlider.value();
                sim.beam.numBarras = dom.numBarrasInput.value(); sim.beam.diamKey = dom.diamBarrasSelect.value();
                sim.beam.As = sim.beam.numBarras * diametros_cm2[sim.beam.diamKey];
                dom.longitudVal.html(parseFloat(sim.beam.L).toFixed(1)); dom.baseVal.html(parseFloat(sim.beam.b).toFixed(0));
                dom.alturaVal.html(parseFloat(sim.beam.h).toFixed(0)); dom.fcVal.html(parseFloat(sim.beam.fc).toFixed(0));
                dom.asVal.html(parseFloat(sim.beam.As).toFixed(1));
                calculateResistantMoment(); resetSimulation();
            }

            function calculateResistantMoment() {
                const d = sim.beam.h - sim.beam.rec; if (d <= 0) { sim.phiMn = 0; return; }
                const analysisResult = findNeutralAxis(sim.beam);
                const c = analysisResult.c; const fs = analysisResult.fs;
                sim.beam.c = c;
                const epsilon_s = epsilon_c_ult * (d - c) / c; sim.beam.epsilon_s = epsilon_s;
                const epsilon_y = sim.beam.fy / Es; let phi;
                if (epsilon_s >= 0.005) phi = 0.90;
                else if (epsilon_s <= epsilon_y) phi = 0.65;
                else phi = 0.65 + 0.25 * (epsilon_s - epsilon_y) / (0.005 - epsilon_y);
                const beta1 = p.max(0.65, 0.85 - 0.05 * p.max(0, sim.beam.fc - 280) / 70);
                const a = beta1 * c; const Mn = sim.beam.As * fs * (d - a / 2);
                sim.phiMn = phi * Mn / 100;
                updateFailureType(epsilon_s, epsilon_y);
                p.select('#momento-res').html(`${Math.round(sim.phiMn).toLocaleString('es-MX')} kg-m`);
            }

            function updateFailureType(epsilon_s, epsilon_y) {
                let msg, color;
                if (epsilon_s >= 0.005) { msg = "DÚCTIL"; color = "text-emerald-400"; } 
                else if (epsilon_s <= epsilon_y) { msg = "FRÁGIL"; color = "text-rose-500"; }
                else { msg = "TRANSICIÓN"; color = "text-amber-400"; }
                dom.failureTypeEl.html(msg).class(`font-bold ${color}`);
            }
            
            function findNeutralAxis(beam) {
                const d = beam.h - beam.rec; let c_low = 0.001, c_high = beam.h, c = d/2;
                const beta1 = p.max(0.65, 0.85 - 0.05 * p.max(0, beam.fc - 280) / 70);
                for (let i = 0; i < 100; i++) {
                    c = (c_low + c_high) / 2; if (c <= 0) c = 0.001;
                    const T = beam.As * Math.min(beam.fy, Es * epsilon_c_ult * (d - c) / c);
                    const C = 0.85 * beam.fc * (beta1 * c) * beam.b;
                    if (Math.abs(T - C) < 1.0) break;
                    if (C > T) c_high = c; else c_low = c;
                }
                return { c: c, fs: Math.min(beam.fy, Es * epsilon_c_ult * (d - c) / c) };
            }

            function resetSimulation() {
                sim.running = false; sim.beamFailed = false; sim.load = 0; sim.loadIncrement = 0;
                updateStatus('Carga en reposo', 'bg-slate-900', 'text-slate-400 border border-slate-800');
                if (p5_instances.strainProfile) p5_instances.strainProfile.update(0);
                if (p5_instances.crossSection) p5_instances.crossSection.update();
                p.loop();
            }

            function updateStatus(message, bgColor, textColor) { p.select('#status-message').html(message).class(`py-1 text-center font-bold text-sm rounded-md mx-2 ${bgColor} ${textColor}`); }

            p.draw = function() {
                p.background(11, 15, 25); // Fondo oscuro unificado
                if (sim.running && !sim.beamFailed) { sim.load += sim.loadIncrement; updateStatus('Incrementando Carga...', 'bg-amber-500/20', 'text-amber-400 border border-amber-500/50'); }
                let Mu = (sim.load * sim.beam.L * sim.beam.L) / 8;
                if (Mu >= sim.phiMn && !sim.beamFailed && sim.phiMn > 0) {
                    sim.beamFailed = true; sim.running = false; Mu = sim.phiMn; sim.load = sim.failureLoad;
                    updateStatus('¡FALLA ESTRUCTURAL DE LA VIGA!', 'bg-rose-500/20', 'text-rose-400 border border-rose-500/50'); p.noLoop();
                }
                p.select('#momento-max').html(`${Math.round(Mu).toLocaleString('es-MX')} kg-m`);
                let progress = sim.phiMn > 0 ? Mu / sim.phiMn : 0;
                if (p5_instances.strainProfile) p5_instances.strainProfile.update(progress);
                if (p5_instances.crossSection) p5_instances.crossSection.update();
                drawBeamAndForces(Mu);
            };

            function drawBeamAndForces(Mu) {
                const marginX = p.width * 0.12; const beamY = p.height * 0.35;
                const beamLen = p.width - 2 * marginX; const { L, h, fc, b } = sim.beam;
                p.push(); p.translate(marginX, beamY);
                p.fill(150); p.noStroke(); p.triangle(0, 0, -10, 15, 10, 15);
                p.triangle(beamLen, 0, beamLen - 10, 15, beamLen + 10, 15);
                if (sim.load > 0) {
                    p.fill(245, 158, 11, 150); // Naranja neón para vectores de carga
                    const maxLoadForScale = sim.failureLoad > 0 ? sim.failureLoad * 1.1 : 10000;
                    const loadHeight = p.map(sim.load, 0, maxLoadForScale, 0, 30);
                    for (let x = 0; x <= beamLen; x += 15) arrow(x, -loadHeight - 8, 0, loadHeight);
                }
                if (sim.load > 0 && sim.phiMn > 0) {
                    const L_cm = L * 100;
                    const flecha_max_cm = (5 * (sim.load / 100) * L_cm**4) / (384 * (15000 * p.sqrt(fc)) * (b * h**3 / 12));
                    const flecha_visible = flecha_max_cm * ((p.height * 0.25) / (L_cm / 240));
                    p.noFill(); p.stroke(sim.beamFailed ? '#f43f5e' : '#3b82f6'); p.strokeWeight(5);
                    p.beginShape(); p.curveVertex(0, 0); p.curveVertex(0, 0);
                    for (let x = 0; x <= beamLen; x += 10) p.curveVertex(x, 4 * flecha_visible * (x / beamLen - (x/beamLen)**2));
                    p.curveVertex(beamLen, 0); p.curveVertex(beamLen, 0); p.endShape();
                }
                p.noFill(); p.stroke(180); p.strokeWeight(1.5); p.rect(0, -5, beamLen, 10);
                p.pop();
                drawDiagrams(Mu, marginX, beamLen);
            }

            function drawDiagrams(Mu, marginX, beamLen) {
                const diagramY_V = p.height * 0.68; const diagramY_M = p.height * 0.88; const diagramH = p.height * 0.10;
                const Vmax = (sim.load * sim.beam.L) / 2;
                const escalaV = sim.Vmax_at_failure > 0 ? diagramH / sim.Vmax_at_failure : 0;
                const escalaM = sim.phiMn > 0 ? diagramH / (sim.phiMn * 1.1) : 0;
                drawSingleDiagram('V', marginX, diagramY_V, beamLen, (x_norm) => (0.5 - x_norm) * 2 * Vmax * escalaV, '#00FFFF');
                drawSingleDiagram('M', marginX, diagramY_M, beamLen, (x_norm) => 4 * Mu * (x_norm - x_norm**2) * escalaM, '#FF00FF');
            }

            function drawSingleDiagram(title, x, y, w, func, colorHex) {
                p.push(); p.translate(x, y);
                p.stroke(50); p.line(0, -25, 0, 25);
                p.noStroke(); let c = p.color(colorHex); c.setAlpha(40); p.fill(c);
                p.beginShape(); p.vertex(0, 0);
                for (let i = 0; i <= w; i++) p.vertex(i, -func(i / w));
                p.vertex(w, 0); p.endShape(p.CLOSE);
                p.stroke(colorHex); p.strokeWeight(1.5); p.line(0,0,w,0);
                p.noStroke(); p.fill(200); p.textSize(10); p.textAlign(p.RIGHT, p.CENTER); p.text(title, -8, 0);
                p.pop();
            }

            function arrow(x, y, angle, len) {
                p.push(); p.translate(x, y); p.rotate(angle); p.stroke(245, 158, 11); p.line(0, 0, 0, len); p.fill(245, 158, 11); p.triangle(0, len, -2, len - 3, 2, len - 3); p.pop();
            }
        };

        // SKETCH PARA PERFIL DE DEFORMACIÓN
        let strainProfileSketch = function(p) {
            let progress = 0, beamParams = {};
            p.setup = function() {
                const containerEl = document.getElementById('strain-profile-container');
                p.createCanvas(containerEl.offsetWidth, containerEl.offsetHeight).parent(containerEl);
                p.noLoop();
            };
            p.update = function(newProgress) {
                progress = p.constrain(newProgress, 0, 1);
                if (p5_instances.main && p5_instances.main.sim) beamParams = p5_instances.main.sim.beam;
                p.redraw();
            };
            p.draw = function() {
                p.background(15, 23, 42); // Fondo oscuro complementario
                if (!beamParams || !beamParams.h) return;
                const { h, c, epsilon_s, rec } = beamParams; if (c <= 0) return;
                const current_epsilon_c = progress * epsilon_c_ult;
                const current_epsilon_s = progress * epsilon_s;
                p.push(); p.translate(p.width / 2, p.height / 2); p.scale(p.height / h * 0.7); p.translate(0, -h/2);
                p.stroke(80); p.line(0, 0, 0, h);
                const max_abs_strain = Math.max(epsilon_c_ult, epsilon_s);
                const scaleX = (p.width / 2.5) / max_abs_strain / (p.height / h * 0.7) ;
                p.stroke('#f43f5e'); p.strokeWeight(2); p.fill(244, 63, 94, 40);
                p.triangle(0, c, current_epsilon_c * scaleX, 0, 0, 0);
                p.triangle(0, c, -current_epsilon_s * scaleX, h - rec, 0, h - rec);
                p.stroke(37, 99, 235, 100); p.line(-p.width, c, p.width, c);
                p.pop();
            };
        };
        
        // SKETCH PARA SECCIÓN TRANSVERSAL
        let crossSectionSketch = function(p) {
            let beamParams = {};
            p.setup = function() {
                const containerEl = document.getElementById('cross-section-container');
                p.createCanvas(containerEl.offsetWidth, containerEl.offsetHeight).parent(containerEl);
                p.noLoop();
            };
            p.update = function() {
                if (p5_instances.main && p5_instances.main.sim) beamParams = p5_instances.main.sim.beam;
                p.redraw();
            };
            p.draw = function() {
                p.background(15, 23, 42);
                if (!beamParams || !beamParams.h) return;
                const { h, b, rec, numBarras, diamKey } = beamParams; const d = h - rec;
                p.push(); p.translate(p.width/2, p.height/2);
                const scaleFactor = p.min(p.width / (b * 1.5), p.height / (h * 1.5));
                p.scale(scaleFactor); p.translate(-b/2, -h/2);
                p.stroke(100); p.fill(71, 85, 105); p.rect(0,0,b,h);
                const barDiameter = diametros_mm[diamKey] / 10;
                const spacing = numBarras > 1 ? (b - 2 * rec - barDiameter) / (numBarras - 1) : 0;
                p.fill('#ea580c'); p.noStroke(); // Varillas en naranja brillante
                for (let i = 0; i < numBarras; i++) {
                    let x_pos = numBarras > 1 ? rec + barDiameter / 2 + i * spacing : b / 2;
                    p.ellipse(x_pos, d, barDiameter, barDiameter);
                }
                p.pop();
            };
        };

        function startSketchesWhenReady() {
            const mainC = document.getElementById('canvas-container');
            const strainC = document.getElementById('strain-profile-container');
            if (mainC && strainC && mainC.offsetWidth > 0) {
                p5_instances.main = new p5(mainSketch);
                p5_instances.strainProfile = new p5(strainProfileSketch);
                p5_instances.crossSection = new p5(crossSectionSketch);
            } else {
                setTimeout(startSketchesWhenReady, 50);
            }
        }
        window.onload = startSketchesWhenReady;
    </script>
</body>
</html>
